name: 安装RedSkill和Heytea

on:
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: 下载安装脚本
        run: curl -fsSL -o install-redskill.sh https://redskill.xiaohongshu.net/install.sh

      - name: 运行安装脚本
        run: bash install-redskill.sh

      - name: 检查redskill是否装好
        run: which redskill

      - name: 安装Heytea技能
        run: redskill install heytea

      - name: 查看所有技能
        run: redskill list
